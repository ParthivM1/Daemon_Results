<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Daemon versus Fire Opal matched benchmark gaps">
  <style>
    .bg { fill: #0d1117; }
    .title { fill: #f0f6fc; font: 700 28px Arial, sans-serif; }
